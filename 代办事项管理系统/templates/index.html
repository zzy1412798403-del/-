<!DOCTYPE html>
<html>
<head>
    <title>待办事项</title>
</head>
<body>
    <h1>我的待办清单</h1>
    <form action="/add" method="post">
        <input type="text" name="task" placeholder="输入任务">
        <button type="submit">添加</button>
    </form>
    <ul>
        {% for todo in todos %}
        <li>
            {% if todo.done %} ✅ {% endif %}
            {{ todo.task }}
            {% if not todo.done %}
            <a href="/done/{{ loop.index0 }}">标记完成</a>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</body>
</html>
